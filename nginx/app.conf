# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=app_limit:10m  rate=20r/s;
limit_req_zone $binary_remote_addr zone=logs_limit:10m rate=5r/s;

# ── HTTP → HTTPS redirect  +  ACME challenge passthrough ─────────────────────
server {
    listen      80;
    server_name asilbekabdurahmonov.uz www.asilbekabdurahmonov.uz
                logs.asilbekabdurahmonov.uz;

    # Let Certbot answer the ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main site ─────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    http2       on;
    server_name asilbekabdurahmonov.uz www.asilbekabdurahmonov.uz;

    ssl_certificate     /etc/letsencrypt/live/asilbekabdurahmonov.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asilbekabdurahmonov.uz/privkey.pem;
    include             /etc/nginx/ssl_options.conf;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    client_max_body_size 50M;

    # ── Static files (served directly — zero Python overhead) ──────────────
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Media uploads ───────────────────────────────────────────────────────
    location /media/ {
        alias   /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Application ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=app_limit burst=40 nodelay;

        proxy_pass            http://web:8000;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_redirect        off;
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
    }
}

# ── Logs subdomain → Dozzle (Basic Auth via Nginx) ───────────────────────────
server {
    listen      443 ssl;
    http2       on;
    server_name logs.asilbekabdurahmonov.uz;

    ssl_certificate     /etc/letsencrypt/live/asilbekabdurahmonov.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asilbekabdurahmonov.uz/privkey.pem;
    include             /etc/nginx/ssl_options.conf;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Basic Auth ──────────────────────────────────────────────────────────
    auth_basic           "Restricted — Monitoring Portal";
    auth_basic_user_file /etc/nginx/.htpasswd_logs;

    location / {
        limit_req zone=logs_limit burst=10 nodelay;

        proxy_pass            http://dozzle:8080;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        # WebSocket support (Dozzle uses SSE/WS for live streaming)
        proxy_set_header      Upgrade           $http_upgrade;
        proxy_set_header      Connection        "upgrade";
        proxy_http_version    1.1;
        proxy_read_timeout    300s;
    }
}
