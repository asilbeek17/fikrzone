<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Kirish — Fikrzone</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      background:#0a0a0f;
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background-image:radial-gradient(circle,#27272f 1px,transparent 1px);
      background-size:28px 28px;opacity:0.4;pointer-events:none;
    }
    body::after{
      content:'';position:fixed;
      top:-40%;left:-20%;width:600px;height:600px;
      background:radial-gradient(circle,rgba(79,70,229,0.12) 0%,transparent 70%);
      pointer-events:none;
    }
    .login-card{
      position:relative;z-index:1;
      background:#16161f;border:1px solid #27272f;
      border-radius:20px;padding:3rem 2.5rem;
      width:100%;max-width:420px;
      box-shadow:0 32px 80px rgba(0,0,0,0.6);
    }
    .login-brand{
      font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;
      color:#fafafa;letter-spacing:-0.05em;
      display:flex;align-items:center;gap:.5rem;margin-bottom:2rem;
    }
    .login-brand-dot{
      width:10px;height:10px;border-radius:50%;background:#4f46e5;
      animation:pulse 3s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.6}}
    .login-title{font-size:1.1rem;font-weight:600;color:#fafafa;margin-bottom:.35rem;}
    .login-sub{font-size:.85rem;color:#71717a;margin-bottom:2rem;}
    label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#71717a;margin-bottom:.4rem;font-family:'Inter',sans-serif;}
    input{
      display:block;width:100%;padding:.75rem 1rem;
      background:#0d0d14;border:1.5px solid #27272f;border-radius:8px;
      color:#e4e4e7;font-family:'Inter',sans-serif;font-size:.95rem;
      outline:none;transition:border-color .15s,box-shadow .15s;
      margin-bottom:1.1rem;
    }
    input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.15);}
    input::placeholder{color:#3f3f46;}
    .login-btn{
      width:100%;padding:.8rem;background:#4f46e5;color:#fff;
      border:none;border-radius:8px;font-family:'Inter',sans-serif;
      font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.02em;
      transition:all .15s;margin-top:.5rem;
    }
    .login-btn:hover{background:#4338ca;box-shadow:0 8px 24px rgba(79,70,229,.35);transform:translateY(-1px);}
    .login-error{
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
      border-radius:8px;padding:.75rem 1rem;margin-bottom:1.25rem;
      font-size:.85rem;color:#f87171;
    }
    .back-link{display:block;text-align:center;margin-top:1.5rem;font-size:.82rem;color:#3f3f46;text-decoration:none;}
    .back-link:hover{color:#818cf8;}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">Fikrzone<span class="login-brand-dot"></span></div>
    <p class="login-title">Admin kirish</p>
    <p class="login-sub">Maqola yozish va boshqarish uchun kiring.</p>
    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="username">Foydalanuvchi nomi</label>
      <input type="text" id="username" name="username" placeholder="foydalanuvchi nomingiz" autofocus required />
      <label for="password">Parol</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required />
      <button type="submit" class="login-btn">Kirish →</button>
    </form>
    <a href="/" class="back-link">← Saytga qaytish</a>
  </div>
</body>
</html>
