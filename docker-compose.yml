version: '3.9'

# ── Editorial — Production Docker Compose ─────────────────────────────────────
# Domain:     https://asilbekabdurahmonov.uz
# Logs:       https://logs.asilbekabdurahmonov.uz
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Django / Gunicorn ────────────────────────────────────────────────────────
  web:
    image: ${IMAGE_NAME:-ghcr.io/your-github-user/editorial:latest}
    restart: unless-stopped
    env_file: .env
    volumes:
      - sqlite_data:/app/data          # SQLite persistence
      - media_data:/app/media           # Uploaded media
      - static_data:/app/staticfiles    # Collected static files
    networks:
      - internal
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/options-ssl-nginx.conf:/etc/nginx/ssl_options.conf:ro
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro
      - ./nginx/.htpasswd_logs:/etc/nginx/.htpasswd_logs:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - internal
    depends_on:
      web:
        condition: service_healthy

  # ── Dozzle (real-time log streaming) ─────────────────────────────────────────
  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    expose:
      - "8080"

volumes:
  sqlite_data:
  media_data:
  static_data:
  certbot_webroot:

networks:
  internal:
    driver: bridge
